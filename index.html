<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Autos</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f0f0f;color:#e0e0e0;min-height:100vh;display:flex;justify-content:center;padding:20px}
  .container{width:100%;max-width:800px}
  h1{text-align:center;margin:30px 0;font-size:1.8rem;color:#fff}
  /* buscador */
  .search-box{background:#1a1a2e;border-radius:12px;padding:20px;margin-bottom:20px}
  .search-box label{display:block;margin-bottom:8px;color:#aaa;font-size:.9rem}
  .search-row{display:flex;gap:10px}
  .search-row input{flex:1;background:#16213e;border:1px solid #2a2a4a;color:#e0e0e0;padding:12px 16px;border-radius:8px;font-size:1rem;outline:none}
  .search-row input:focus{border-color:#4a6cf7}
  .search-row button{background:#4a6cf7;color:#fff;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:1rem;font-weight:600}
  .search-row button:hover{background:#3b5de7}
  /* form */
  .form-box{background:#1a1a2e;border-radius:12px;padding:20px;margin-bottom:20px}
  .form-box h2{margin-bottom:16px;color:#fff;font-size:1.2rem}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-grid .full{grid-column:1/-1}
  .form-grid label{display:block;margin-bottom:4px;color:#aaa;font-size:.85rem}
  .form-grid input,.form-grid textarea{width:100%;background:#16213e;border:1px solid #2a2a4a;color:#e0e0e0;padding:10px 14px;border-radius:8px;font-size:.95rem;outline:none;font-family:inherit}
  .form-grid input:focus,.form-grid textarea:focus{border-color:#4a6cf7}
  .form-grid textarea{resize:vertical;min-height:60px}
  .plate-row{display:flex;gap:8px;align-items:center}
  .plate-row input{flex:1}
  .plate-row span{color:#666;font-size:1.2rem;font-weight:700}
  .required label::after{content:" *";color:#f74a4a}
  .form-actions{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
  .btn{background:#333;color:#e0e0e0;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:.95rem;font-weight:600}
  .btn:hover{filter:brightness(1.2)}
  .btn-primary{background:#4a6cf7;color:#fff}
  .btn-danger{background:#dc3545;color:#fff}
  .btn-warning{background:#ffc107;color:#1a1a1a}
  /* paleta colores */
  .color-palette{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
  .color-swatch{width:36px;height:36px;border-radius:50%;border:2px solid #2a2a4a;cursor:pointer;transition:transform .15s, border-color .15s}
  .color-swatch:hover{transform:scale(1.15)}
  .color-swatch.active{border-color:#fff;transform:scale(1.15)}
  .color-selected{display:flex;align-items:center;gap:10px;margin-top:8px;font-size:.85rem;color:#aaa}
  .color-selected .preview{width:24px;height:24px;border-radius:50%;border:1px solid #444}
  .color-input-row{display:flex;gap:10px;align-items:center}
  .color-input-row input[type="color"]{width:48px;height:40px;padding:2px;border-radius:8px;border:1px solid #2a2a4a;background:transparent;cursor:pointer;flex:0 0 auto}
  .color-input-row input[type="color"]::-webkit-color-swatch-wrapper{padding:2px}
  .color-input-row input[type="color"]::-webkit-color-swatch{border-radius:6px;border:none}
  /* tabla */
  .table-box{background:#1a1a2e;border-radius:12px;padding:20px;overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;padding:12px 10px;border-bottom:2px solid #2a2a4a;color:#aaa;font-size:.85rem}
  td{padding:10px;border-bottom:1px solid #222}
  tr:hover{background:#16213e}
  .td-actions{display:flex;gap:6px}
  .td-actions .btn{padding:6px 12px;font-size:.8rem}
  .empty{text-align:center;padding:40px;color:#666}
  .badge{display:inline-block;background:#2a2a4a;padding:3px 8px;border-radius:4px;font-size:.8rem}
  /* responsive */
  @media(max-width:600px){
    .form-grid{grid-template-columns:1fr}
    .search-row{flex-direction:column}
    .search-row button{width:100%}
    .container{padding:0}
  }
</style>
</head>
<body>

<div class="container">

<h1>🚗 Gestión de Autos</h1>

<!-- BUSCADOR -->
<div class="search-box">
  <label>🔍 Buscar por número de matrícula</label>
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="Ej: 1234" oninput="renderTable()">
    <button onclick="document.getElementById('searchInput').value='';renderTable()">✕ Limpiar</button>
  </div>
</div>

<!-- FORMULARIO -->
<div class="form-box">
  <h2 id="formTitle">➕ Agregar auto</h2>
  <div class="form-grid">
    <div class="full">
      <label>Matrícula</label>
      <div class="plate-row">
        <input type="text" id="plateLetters" placeholder="Letras (opcional)" maxlength="3" style="text-transform:uppercase">
        <span>—</span>
        <input type="text" id="plateNumbers" placeholder="Números *" maxlength="4" inputmode="numeric" pattern="[0-9]*">
      </div>
    </div>
    <div class="required">
      <label>Color</label>
      <div class="color-input-row">
        <input type="color" id="colorPicker" value="#dc3545" oninput="selectColor(this.value)">
        <div class="color-palette" id="colorPalette"></div>
      </div>
      <div class="color-selected" id="colorSelected">
        <span class="preview" id="colorPreview" style="background:#dc3545"></span>
        <span id="colorName">Rojo</span>
      </div>
    </div>
    <div>
      <label>Marca</label>
      <input type="text" id="marca" placeholder="Ej: Toyota">
    </div>
    <div>
      <label>Modelo</label>
      <input type="text" id="modelo" placeholder="Ej: Corolla">
    </div>
    <div class="full">
      <label>Dirección</label>
      <input type="text" id="direccion" placeholder="Ej: Calle Falsa 123">
    </div>
    <div class="full">
      <label>Notas</label>
      <textarea id="notas" placeholder="Notas adicionales..."></textarea>
    </div>
  </div>
  <div class="form-actions">
    <button class="btn" onclick="cancelEdit()" id="cancelBtn" style="display:none">Cancelar</button>
    <button class="btn btn-primary" onclick="saveAuto()">💾 Guardar</button>
  </div>
</div>

<!-- TABLA -->
<div class="table-box">
  <table>
    <thead>
      <tr>
        <th>Matrícula</th>
        <th>Color</th>
        <th>Marca</th>
        <th>Modelo</th>
        <th style="text-align:center">Acciones</th>
      </tr>
    </thead>
    <tbody id="tableBody">
    </tbody>
  </table>
  <div id="emptyMsg" class="empty">No hay autos registrados. ¡Agregá el primero!</div>
</div>

</div>

<script>
// --- PALETA DE COLORES ---
const COLORS = [
  {hex:'#dc3545',name:'Rojo'},
  {hex:'#003399',name:'Azul oscuro'},
  {hex:'#0d6efd',name:'Azul'},
  {hex:'#0dcaf0',name:'Celeste'},
  {hex:'#198754',name:'Verde'},
  {hex:'#28a745',name:'Verde claro'},
  {hex:'#ffc107',name:'Amarillo'},
  {hex:'#fd7e14',name:'Naranja'},
  {hex:'#8b4513',name:'Marrón'},
  {hex:'#6f42c1',name:'Violeta'},
  {hex:'#d63384',name:'Rosa'},
  {hex:'#212529',name:'Negro'},
  {hex:'#343a40',name:'Gris oscuro'},
  {hex:'#6c757d',name:'Gris'},
  {hex:'#c0c0c0',name:'Plata'},
  {hex:'#f8f9fa',name:'Blanco'},
  {hex:'#d4af37',name:'Dorado'},
  {hex:'#800020',name:'Bordo'}
];

let selectedColor = '#dc3545';

function initPalette(){
  const container = document.getElementById('colorPalette');
  container.innerHTML = COLORS.map(c =>
    `<div class="color-swatch${c.hex===selectedColor?' active':''}" style="background:${c.hex}" onclick="selectColor('${c.hex}')" title="${c.name}"></div>`
  ).join('');
  updateColorLabel();
}

function selectColor(hex){
  selectedColor = hex;
  document.getElementById('colorPicker').value = hex;
  document.querySelectorAll('.color-swatch').forEach(el => {
    el.classList.toggle('active', el.style.background === `rgb(${hexToRgb(hex)})` || el.style.background === hex);
  });
  // marcar activo por hex
  document.querySelectorAll('.color-swatch').forEach(el => {
    const bg = el.style.background;
    // comparar normalizado
    el.classList.toggle('active', normalizeColor(bg) === normalizeColor(hex));
  });
  updateColorLabel();
}

function updateColorLabel(){
  const c = COLORS.find(x => normalizeColor(x.hex) === normalizeColor(selectedColor));
  document.getElementById('colorPreview').style.background = selectedColor;
  document.getElementById('colorName').textContent = c ? c.name : selectedColor;
}

function normalizeColor(c){
  // acepta hex o rgb
  if(c.startsWith('#')) return c.toLowerCase();
  // convertir rgb a hex
  const m = c.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
  if(m) return '#' + [m[1],m[2],m[3]].map(x => (+x).toString(16).padStart(2,'0')).join('');
  return c;
}

function hexToRgb(hex){
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r}, ${g}, ${b}`;
}

// --- DATOS ---
let autos = JSON.parse(localStorage.getItem('autos')) || [];
let editingId = null;

function persist(){localStorage.setItem('autos',JSON.stringify(autos))}

// --- VALIDAR FORM ---
function getFormData(){
  const letters = document.getElementById('plateLetters').value.trim().toUpperCase();
  const numbers = document.getElementById('plateNumbers').value.trim();
  if(!numbers){
    alert('El número de matrícula es obligatorio.');
    return null;
  }
  return {
    plateLetters: letters,
    plateNumbers: numbers,
    color: selectedColor,
    colorName: COLORS.find(c=>normalizeColor(c.hex)===normalizeColor(selectedColor))?.name || selectedColor,
    marca: document.getElementById('marca').value.trim(),
    modelo: document.getElementById('modelo').value.trim(),
    direccion: document.getElementById('direccion').value.trim(),
    notas: document.getElementById('notas').value.trim()
  };
}

function clearForm(){
  document.getElementById('plateLetters').value='';
  document.getElementById('plateNumbers').value='';
  document.getElementById('marca').value='';
  document.getElementById('modelo').value='';
  document.getElementById('direccion').value='';
  document.getElementById('notas').value='';
  selectedColor = '#dc3545';
  document.getElementById('colorPicker').value = '#dc3545';
  document.querySelectorAll('.color-swatch').forEach(el => {
    el.classList.toggle('active', normalizeColor(el.style.background) === normalizeColor('#dc3545'));
  });
  updateColorLabel();
  editingId=null;
  document.getElementById('formTitle').textContent='➕ Agregar auto';
  document.getElementById('cancelBtn').style.display='none';
}

function cancelEdit(){clearForm()}

function saveAuto(){
  const data = getFormData();
  if(!data) return;

  if(editingId){
    const idx = autos.findIndex(a=>a.id===editingId);
    if(idx!==-1){
      autos[idx]={...autos[idx],...data};
      persist();
      renderTable();
      clearForm();
    }
  } else {
    const full = data.plateLetters+data.plateNumbers;
    if(autos.some(a=>a.plateLetters+a.plateNumbers===full)){
      alert('Ya existe un auto con esa matrícula.');
      return;
    }
    autos.push({
      id: Date.now().toString(36)+Math.random().toString(36).slice(2,6),
      ...data
    });
    persist();
    renderTable();
    clearForm();
  }
}

function editAuto(id){
  const a = autos.find(x=>x.id===id);
  if(!a) return;
  editingId=id;
  document.getElementById('plateLetters').value=a.plateLetters;
  document.getElementById('plateNumbers').value=a.plateNumbers;
  selectColor(a.color);
  document.getElementById('marca').value=a.marca;
  document.getElementById('modelo').value=a.modelo;
  document.getElementById('direccion').value=a.direccion;
  document.getElementById('notas').value=a.notas;
  document.getElementById('formTitle').textContent='✏️ Modificar auto';
  document.getElementById('cancelBtn').style.display='inline-block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function deleteAuto(id){
  if(!confirm('¿Eliminar este auto definitivamente?')) return;
  autos = autos.filter(a=>a.id!==id);
  persist();
  if(editingId===id) clearForm();
  renderTable();
}

function renderTable(){
  const q = document.getElementById('searchInput').value.trim();
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyMsg');

  let filtered = autos;
  if(q) filtered = autos.filter(a=>a.plateNumbers.includes(q));

  if(filtered.length===0){
    tbody.innerHTML='';
    empty.style.display='block';
    return;
  }
  empty.style.display='none';

  tbody.innerHTML = filtered.map(a=>`
    <tr>
      <td>${a.plateLetters ? `<span class="badge">${a.plateLetters}</span> ` : ''}<strong>${a.plateNumbers}</strong></td>
      <td><span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:${a.color};vertical-align:middle;margin-right:6px"></span>${a.colorName||a.color}</td>
      <td>${a.marca||'—'}</td>
      <td>${a.modelo||'—'}</td>
      <td style="text-align:center">
        <div class="td-actions" style="justify-content:center">
          <button class="btn btn-warning" onclick="editAuto('${a.id}')">✏️</button>
          <button class="btn btn-danger" onclick="deleteAuto('${a.id}')">🗑️</button>
        </div>
      </td>
    </tr>
  `).join('');
}

// --- INICIO ---
initPalette();
renderTable();
</script>

</body>
</html>
